models:
  coordinator:
    provider: ollama
    model: qwen3.5:2b
    gpu_layers: auto
    temperature: 0.2
    max_tokens: 400
    timeout: 60
  generator:
    provider: ollama
    model: qwen3.5:9b
    gpu_layers: auto
    temperature: 0.7
    max_tokens: 2048
    timeout: 120
  utility:
    provider: ollama
    model: qwen3.5:9b
    gpu_layers: auto
    temperature: 0.3
    max_tokens: 4096
    timeout: 180
  embedder:
    provider: ollama
    model: nomic-embed-text
    device: auto
hardware:
  auto_gpu_layers: true
  vram_reserve_mb: 512
  cpu_threads: 0
  vram_overflow_strategy: offload
memory:
  num_ctx: 8192
  context_window_messages: 12
  keep_after_reset: 6
  meta_coordinate_every: 4
  max_hot_facts: 50
  hot_evict_threshold: 0.2
  working_memory_tokens: 500
  adaptive_reset:
    enabled: true
    cci_threshold: 0.55
    min_turns_between_resets: 4
    max_turns_without_reset: 16
  max_storage_facts: 1000
server:
  host: 0.0.0.0
  port: 7860
  workers: 1
  log_level: INFO
ollama:
  base_url: http://host.docker.internal:11434
  timeout: 120
