models:
  coordinator:
    provider: ollama
    model: qwen2.5:1.5b
    gpu_layers: auto
    temperature: 0.2
    max_tokens: 400
    timeout: 60

  generator:
    provider: ollama
    model: qwen2.5:7b
    gpu_layers: auto
    temperature: 0.7
    max_tokens: 2048
    timeout: 120
    fallback_model: qwen2.5:3b

  embedder:
    provider: sentence_transformers
    model: all-MiniLM-L6-v2
    device: auto

hardware:
  auto_gpu_layers: true
  vram_reserve_mb: 512
  cpu_threads: 0
  vram_overflow_strategy: offload

memory:
  context_window_messages: 12
  keep_after_reset: 6
  meta_coordinate_every: 4
  max_hot_facts: 50
  hot_evict_threshold: 0.2
  adaptive_reset:
    enabled: true
    cci_threshold: 0.55
    min_turns_between_resets: 4
    max_turns_without_reset: 16
  max_storage_facts: 1000

server:
  host: 0.0.0.0
  port: 7860
  workers: 1
  log_level: INFO

ollama:
  base_url: http://localhost:11434
  timeout: 120
