# Pure Intellect — конфигурация по умолчанию
# ВНИМАНИЕ: Для изменения моделей используй Admin Panel → AZ Plugin Config
# Значения ниже — только defaults при первом запуске
# Они НЕ влияют на работу если az_plugin_config.yaml уже настроен

models:
  coordinator:
    provider: ollama
    model: qwen3.5:2b
    gpu_layers: auto
    temperature: 0.2
    max_tokens: 400
    timeout: 60

  generator:
    provider: ollama
    model: qwen3.5:9b
    gpu_layers: auto
    temperature: 0.7
    max_tokens: 2048
    timeout: 120

  embedder:
    # Используй Ollama (nomic-embed-text должна быть скачана через 'ollama pull nomic-embed-text')
    # Альтернатива: sentence_transformers (требует pip install sentence-transformers)
    provider: ollama
    model: nomic-embed-text
    device: auto

hardware:
  auto_gpu_layers: true
  vram_reserve_mb: 512
  cpu_threads: 0
  vram_overflow_strategy: offload

memory:
  context_window_messages: 12
  keep_after_reset: 6
  meta_coordinate_every: 4
  max_hot_facts: 50
  hot_evict_threshold: 0.2
  adaptive_reset:
    enabled: true
    cci_threshold: 0.55
    min_turns_between_resets: 4
    max_turns_without_reset: 16
  max_storage_facts: 1000

server:
  host: 0.0.0.0
  port: 7860
  workers: 1
  log_level: INFO

ollama:
  base_url: http://localhost:11434
  timeout: 120
